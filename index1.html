<title>🌙 บ้านแห่งแสงจันทร์ 🌙</title>

<style>

/* ===================== RESET======================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* =================LOCK SCREEN============================ */

html,body{
  width:100%;
  max-width:100%;
  overflow-x:hidden;
}

body{
  font-family:sans-serif;
  background:#000;
  color:white;
}

/* ===== กันภาพล้น ===== */

img,
video,
iframe{
  max-width:100%;
  height:auto;
  display:block;
}

/* =================ปกบ้าน================= */

/* ===== โลโก้ ===== */

.logo{
  display:block;
  align-self:flex-start !important;
  width:140px;
  border-radius:80%;
  box-shadow:0 0 10px rgba(255,255,255,0.35);
  align-self:flex-end;
  margin-top:-50px;
  margin-right:auto !important;
  margin-left:350px !important;
  z-index:999;
}

.home-cover{
  min-height:100vh;
  background:
    url("banner.jpg");
  background-size:cover;
  background-position:center;
  display:grid;
  gap:0px;
  padding:24px;
  grid-template-columns:80% 20% !important;
  display:grid;
  grid-template-columns:20% 80%;
}

/* ===== ชื่อบ้าน ===== */

.home-title{
  font-size:clamp(35px,5vw,55px);
  line-height:1;
  margin-top:10px;
}

/* ===== คำโปรย ===== */

.home-text{
  font-size:28px;
  line-height:1.7;
  max-width:50%;
  text-shadow:0 0 10px rgba(0,0,0,0.85);
   margin-top:60px;
}

/* =================== ฝั่งขวา =================== */

.right-side{
  grid-column:1;
  grid-row:1;
  background:none;
  border-radius:30px;
  padding:30px 20px;
  padding-left:300px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  text-align:center;
  gap:0px;
  position:relative;
}

/* ===== ปุ่มเพลง ===== */

.music-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  margin-left:1000px;
  margin:auto;
  margin-top:150px;
  align-self:center;
  padding:14px 28px;
  background:rgba(255,255,255,0.9);
  color:#1e5eff;
  text-decoration:none;
  border-radius:30px;
  border:2px solid rgba(30,94,255,0.75);
  font-size:20px;
  font-weight:bold;
}

/* ===== LOGO GLOW ===== */

.logo{
  animation:
  logoPulse 5s ease-in-out infinite;
}
/* ===== จังหวะแสง ===== */

@keyframes logoPulse{
  0%{
    transform:scale(1);
    filter:
    drop-shadow(0 0 6px rgba(255,255,255,0.35));
  }
  50%{
    transform:scale(1.04);
    filter:
    drop-shadow(0 0 20px rgba(255,255,255,0.8));
  }
  100%{
    transform:scale(1);
    filter:
    drop-shadow(0 0 6px rgba(255,255,255,0.35));
  }
}

/* ===== MOON MAGIC EFFECTS ===== */

/* ชื่อบ้านลอยนุ่ม */
.home-title{
  animation: softFloat 4s ease-in-out infinite;
}

@keyframes softFloat{
  0%{ transform:translateY(0); }
  50%{ transform:translateY(-8px); }
  100%{ transform:translateY(0); }
}

/* แสงเรืองเบา ๆ */
.home-title,
.home-text,
.logo{
  filter:drop-shadow(0 0 10px rgba(255,255,255,0.35));
}

/* ดาวตก */
.home-cover::before{
  content:"";
  position:absolute;
  top:8%;
  left:-20%;
  width:160px;
  height:2px;
  background:linear-gradient(90deg, transparent, white, transparent);
  opacity:0.8;
  transform:rotate(-25deg);
  animation: shootingStar 5s linear infinite;
  z-index:3;
}

@keyframes shootingStar{
  0%{
    left:-20%;
    top:10%;
    opacity:0;
  }
  10%{
    opacity:1;
  }
  45%{
    left:110%;
    top:45%;
    opacity:0;
  }
  100%{
    left:110%;
    top:45%;
    opacity:0;
  }
}

/* ให้ดาวตกอ้างอิงกับหน้าปก */
.home-cover{
  position:relative;
  overflow:hidden;
}

/* =================== ฝั่งซ้าย =================== */

.left-side{
  grid-column:2;
  grid-row:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:0px;
}

/* =========================เมนู========================= */

.main-menu{
  display:flex;
  flex-direction:column;
  gap:14px;
  width:60% !important;
  max-width:60% !important;
  min-width:0 !important;
}

.main-menu a{
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.92);
  color:#1e5eff;
  text-decoration:none;
  border-radius:10px;
  border:2px solid rgba(30,94,255,0.75);
  transition:0.3s;
  width:100% !important;
  max-width:100% !important;
  min-width:0 !important;
  min-height:40px !important;
  font-weight:bold;
  font-size:20px !important;
  padding:8px 6px !important;
}

.main-menu a:hover{
  transform:scale(1.03);
}

/* ===== MOON LIGHT PARTICLES ===== */

.home-cover::after{
  content:"";
  position:absolute;
  inset:0;
  background-image:
    radial-gradient(
      rgba(255,255,255,0.7) 1px,
      transparent 1px),
    radial-gradient(
      rgba(255,220,120,0.5) 2px,
      transparent 2px);
  background-size:
    120px 120px,
    220px 220px;
  animation:
    twinkleMove 14s linear infinite;
  opacity:0.45;
  pointer-events:none;
  z-index:1;
}

/* ===== แสงระยิบ ===== */

@keyframes twinkleMove{
  0%{
    transform:translateY(0px);
  }
  50%{
    transform:translateY(-12px);
  }
  100%{
    transform:translateY(0px);
  }
}
/* ===== MOON BREATH LIGHT ===== */

.home-cover{
  animation:
  moonGlow 6s ease-in-out infinite;
}

/* ===== แสงหายใจ ===== */

@keyframes moonGlow{
  0%{
    filter:
    brightness(1)
    saturate(1);
  }
  50%{
    filter:
    brightness(1.08)
    saturate(1.12);
  }
  100%{
    filter:
    brightness(1)
    saturate(1);
  }
}
/* ===== MOON SHINE ===== */

.home-title{
  position:relative;
  overflow:hidden;
}

/* ===== แสงวิ่ง ===== */

.home-title::after{
  content:"";
  position:absolute;
  top:0;
  left:-120%;
  width:60%;
  height:100%;
  background:
    linear-gradient(
      90deg,
      transparent,
      rgba(255,255,255,0.55),
      transparent
    );
  transform:skewX(-20deg);
  animation:
  moonShine 6s ease-in-out infinite;
}
@keyframes moonShine{
  0%{
    left:-120%;
  }
  45%{
    left:140%;
  }
  100%{
    left:140%;
  }
}
/* ===== MOON LIGHT MOVE ===== */

.light-follow{
  position:absolute;
  width:280px;
  height:280px;
  border-radius:50%;
  background:
  radial-gradient(
    rgba(255,255,255,0.18),
    rgba(255,255,255,0.05),
    transparent
  );
  pointer-events:none;
  mix-blend-mode:screen;
  transform:
  translate(-50%,-50%);
  z-index:1;
}

/* ===== FIREFLIES ===== */

.fireflies{

  position:absolute;

  inset:0;

  overflow:hidden;

  pointer-events:none;

  z-index:2;
}

.fireflies span{

  position:absolute;

  width:6px;
  height:6px;

  border-radius:50%;

  background:
  rgba(255,230,120,0.9);

  box-shadow:
    0 0 8px rgba(255,230,120,0.😎,
    0 0 18px rgba(255,230,120,0.5);

  animation:
  fireflyMove linear infinite;
}

/* ===== การบิน ===== */

@keyframes fireflyMove{
  0%{
    transform:
    translateY(0px)
    translateX(0px);
    opacity:0;
  }
  20%{
    opacity:1;
  }
  50%{
    transform:
    translateY(-40px)
    translateX(20px);
  }
  100%{
    transform:
    translateY(-90px)
    translateX(-30px);
    opacity:0;
  }
}

</style>
