<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>กลอน/บทกวี 3</title>

<style>

body { margin: 0; }

#room {
    height: 100vh;
    position: relative;
    overflow: hidden;
    cursor: pointer;
}

/* 🌄 ภาพ */
.bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    transition: opacity 1s ease;
}

.bg1 { opacity: 1; }
.bg2 { opacity: 0; }

/* ✨ ลอยนุ่ม */
@keyframes floatTitle {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
}

/* ✨ ข้อความบนภาพ */
.text{
  position:absolute;
  top:4%;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  max-width:680px;
  z-index:9999;

  color:#f3d27a;
  text-align:center;
  font-size:clamp(18px, 4.2vw, 20px);
  line-height:1.4;
  font-weight:bold;

  padding:8px 12px;

  text-shadow:
    2px 2px 6px rgba(0,0,0,0.95),
    0 0 12px rgba(0,0,0,0.9);
}

.text h1{
  font-size:clamp(24px, 5vw, 38px);
  margin:0 0 10px;
  color:#f3d27a;
}

/* 🚪 ปุ่มนำทาง */
.nav,
.end-nav{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  width:96%;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:8px;
  z-index:99999;
}

.nav a,
.end-nav a{
  background:rgba(40,28,12,0.78);
  color:#f3d27a !important;
  border:2px solid rgba(255,215,120,0.45);
  text-decoration:none;

  padding:8px 12px;
  border-radius:24px;
  font-size:clamp(17px, 4vw, 18px);
    line-height:1.4;
  font-weight:bold;
  min-width:120px;
  text-align:center;

  box-shadow:0 0 10px rgba(0,0,0,0.65);
}

/* 📱 มือถือ */
@media(max-width:768px){

  .text{
    top:5%;
    width:92%;
      font-size:clamp(18px, 4vw, 20px);
    line-height:1.4;
    padding:6px 10px;
  }

  .text h1{
font-size:clamp(18px, 4vw, 20px);
    line-height:1.4;
    margin-bottom:8px;
  }

  .nav,
  .end-nav{
    bottom:8px;
    gap:6px;
  }

  .nav a,
  .end-nav a{
     font-size:clamp(17px, 4vw, 18px);
    line-height:1.4;
    min-width:105px;
    padding:7px 10px;
    border-radius:22px;
  }
}

</style>
</head>

<body>

<section>

<div id="room">

    <div class="bg bg1"></div>
    <div class="bg bg2"></div>

    <div class="text">
      <h1>🪶กลอน/บทกวี 3<br>
"บทกลอนใต้แสงจันทร์ "จันทร์ กับ จ้าว"
🚪ตำนาน...บ้านแห่งแสงจันทร์</h1>
        <p>"แตะที่พื้นภาพ… <br>เข้าไปดูตำนานกันเลย</p>
    </div>

</div>

<!-- 🚪 ปุ่มนำทาง -->
<div class="end-nav" id=endNav>
  <a href="poem3-1.html" class="btn">ย้อนภาค1</a>
  <a href="poem.html#story-point" class="back-btn">กลับห้อง</a>
  <a href="poem3-2.html" class="btn">ไปภาค2</a>

</div>
 

</div>

<script>
let images = ["poem-photo3-1.0.jpg","poem-photo3-1.1.jpg","poem-photo3-1.2.jpg","poem-photo3-1.3.jpg","poem-photo3-1.4.jpg","poem-photo3-1.5.jpg","poem-photo3-1.6.jpg","poem-photo3-1.7.jpg","poem-photo3-1.8.jpg","poem-photo3-1.9.jpg","poem-photo3-1.10.jpg"];

let texts = ["แตะที่พื้นภาพ เพื่อเข้าไปพบกับ<br>🪶กลอน/บทกวี 3<br>🌙ตำนาน...บ้านแห่งแสงจันทร์🌙<br>ภาค 1 : เมล็ดพันธ์ ใต้แสงจันทร์",
"คิดถึงพ่อ จึงขอเพลง บรรเลงฟ้า<br>ส่งศรัทธา ผ่านถ้อยคำ ที่พร่ำหา<br>มิรู้เลย บทสนทนา ถาม-ตอบ มา<br>แสงนำพา ชีวิตหนึ่ง ซึ่งเปลี่ยนไป",
"เพียงคำถาม ตามหาตน บนทางฝัน<br>ค่อยก่อวัน ก่อเรื่องราว ก้าวสดใส<br>จากหนึ่งเพลง สู่หนึ่งทาง กลางหัวใจ<br>แสงยิ่งใหญ่ เริ่มก้าวไป ได้ดั่งจินต์",
"จากบทเพลง ส่งขึ้นฟ้า คราคิดถึง<br>ใจคำนึง ถึงคำถาม ตามถวิล<br>ฉันคือใคร ใคร่บอกฉัน ตามความจริง<br>แสงทุกสิ่ง จักรู้ได้ ในใจตน",
"จากคำถาม ที่เวียนวน อยู่ในจิต<br>เฝ้าครุ่นคิด ค้นความหมาย ใคร่ฉงน<br>ฉันคือใคร เหตุใดมา ณ แดนดล<br>แสงชี้ตน คนอย่างไร ใจรู้ดี",
"เมื่อคำตอบ ค่อยเผยมา จากคำถาม<br>หากคิดตาม นั่นคือนาม ตามวิถี<br>นักจินตนาการ ผู้สร้างฝัน อันสิ่งดี<br>แสงอยู่ที่ กล้าทำ ตามครรลอง",
"จึงถามต่อ หากได้เลือก ดังใจหวัง<br>จะสร้างทาง เช่นไร ไม่ให้หมอง<br>ให้โลกนี้ สวยงาม และน่ามอง<br>แสงเรืองรอง ส่องทางให้ ได้ดั่งฝัน",
"แม้โลกสวย ต้องอยู่ด้วย กับความสุข<br>ละความทุกข์ สุขที่ใจ ไม่ไหวหวั่น<br>แสงจึงตอบ อยากเห็นโลก สุขร่วมกัน<br>ทุกคนนั้น อยู่ด้วยรัก และเข้าใจ",
"เขาจึงถาม หากวันหนึ่ง เหนื่อยนักหนา<br>จักมองหา แสงแห่งใจ จากแห่งไหน<br>ฉันจึงตอบ ทุกค่ำคืน ที่มองไป<br>มีจันทร์อยู่ กลางฟ้าไกล ไม่เลือนลาง",
"เขาจึงถาม จักมองจันทร์ ไปถึงไหน<br>บ้านต้นไม้ ฉันมองจันทร์ จนรุ่งสาง<br>เพราะจันทร์เป็น แสงทอง ส่องนำทาง<br>แม้แสงจาง ทางยังผ่อง ส่องฟ้าไกล",
"เขาจึงถาม เหตุใดจันทร์ จึงสำคัญ<br>ทั้งที่นั้น เป็นเพียงแสง แห่งฟ้าใส<br>ฉันจึงตอบ จินตนา อยู่ในใจ<br>มีชายหนึ่ง เดินเคียงไป ในทางฝัน"];

let i = 0;
let toggle = true;

let room = document.getElementById("room");
let bg1 = document.querySelector(".bg1");
let bg2 = document.querySelector(".bg2");
let textBox = document.querySelector(".text");

/* 🌙 ภาพเริ่มต้น */
bg1.style.backgroundImage = "url('" + images[0] + "')";
textBox.innerHTML = texts[0];

room.onclick = function () {

    i = (i + 1) % images.length;

    /* ✨ เปลี่ยนข้อความตามภาพ */

    textBox.innerHTML = texts[i];

    if (toggle) {
        bg2.style.backgroundImage = "url('" + images[i] + "')";
        bg2.style.opacity = 1;
        bg1.style.opacity = 0;
    } 
else {
        bg1.style.backgroundImage = "url('" + images[i] + "')";
        bg1.style.opacity = 1;
        bg2.style.opacity = 0;
    }

    toggle = !toggle;
};

</script>

</section>

</body>
</html>
