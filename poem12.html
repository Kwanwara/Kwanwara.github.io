<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    background: url("poem-photo1.jpg") no-repeat center center fixed;
    background-size: cover;
}

/* พื้นหลังมืดให้อ่านง่าย */
.overlay {
    min-height: 100vh;
    background: none;
    padding: 20px;
}

/* ชื่อเรื่อง */
.title {
    text-align: center;
    font-size: 26px;
    color: gold;
    animation: rise 1.5s ease;
}

@keyframes rise {
    from {opacity:0; transform:translateY(30px);}
    to {opacity:1; transform:translateY(0);}
}

/* สารบัญ */
.toc-btn {
   
    display:flex;
    margin:20px auto;
    padding:10px 15px;
    background:gold;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.toc-box.active {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
}

.toc-box {
    display: none;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;

    width: 95%;
    max-width: 900px;

    margin: 5px auto;
    padding: px;

    background: rgba(0,0,0,0.65);
    border-radius: 14px;

    box-shadow: 0 0 25px rgba(255,215,0,0.25);

    animation: fadeInMoon 1.2s ease;
}

.toc-box a {
    display: block;
    color: gold;
    text-decoration: none;

    padding: 10px;
    border-radius: 8px;

    text-shadow: 0 0 6px rgba(255,215,0,0.6);

    transition: all 0.3s ease;
}

.toc-box a:hover {
    background: rgba(255,215,0,0.15);
    box-shadow: 0 0 18px gold;
    transform: scale(1.05);
    color: white;
}

@keyframes fadeInMoon {
    from {opacity:0; transform:translateY(-20px);}
    to {opacity:1; transform:translateY(0);}
}

#moonLight {
    position: fixed;
    width: 120px;
    height: 120px;

    background: radial-gradient(circle,
        rgba(255,255,200,0.6),
        rgba(255,255,200,0.1),
        transparent);

    border-radius: 50%;

    pointer-events: none;

    transform: translate(-50%, -50%);
    transition: left 0.15s ease, top 0.15s ease;

    z-index: 999;
}

#stars {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    pointer-events: none;
    overflow: hidden;
    z-index: 0;
}

.star {
    position: absolute;
    width: 2px;
    height: 60px;

    background: linear-gradient(white, transparent);

    animation: fall 2s linear infinite;
    opacity: 0.6;
}

@keyframes fall {
    from {
        transform: translateY(-100px) translateX(0);
        opacity: 1;
    }
    to {
        transform: translateY(100vh) translateX(50px);
        opacity: 0;
}
}

/* เพลง */
.music {
    position:fixed;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.5);
    padding:8px;
    border-radius:8px;
    box-shadow:0 0 15px gold;
}
#moonLight {
    position: fixed;
    width: 120px;
    height: 120px;

    background: radial-gradient(circle,
        rgba(255,255,200,0.6),
        rgba(255,255,200,0.15),
        transparent);

    border-radius: 50%;

    pointer-events: none;

    transform: translate(-50%, -50%) scale(0);
    opacity: 0;

    z-index: 999;
    transition: transform 0.5s ease, opacity 0.5s ease;
}

toc-column a {
    display: block;

    margin: 3px 0;        /* 🔥 ลดช่องว่าง */
    padding: 4px 6px;     /* 🔥 ลดความหนา */

    font-size: 14px;      /* 🔥 ลดนิดนึง */
    line-height: 1.4;     /* 🔥 ช่วยให้อ่านง่าย */

    border-radius: 6px;
}

.toc-header {
    display: flex;
    justify-content: space-between;
    align-items: center;

    width: 90%;
    max-width: 900px;
    margin: 20px auto;
}

/* หัวข้อ */
.toc-title {
    font-size: 20px;
    color: gold;
}

/* ปุ่มกลับ */
.back-btn {
    padding: 6px 10px;
    background: rgba(255,215,0,0.2);

    color: gold;
    text-decoration: none;

    border-radius: 8px;
    font-size: 13px;

    transition: 0.3s;
}

.back-btn:hover {
    background: gold;
    color: black;
}

.toc-header {
    display: flex;
    justify-content: center;   /* ดันทั้งก้อนมาอยู่กลาง */
    width: 100%;
    margin: 20px 0;
}

/* 🔥 ก้อนเดียวที่รวม title + ปุ่ม */
.toc-group {
    display: flex;
    align-items: center;
}

/* หัวข้อ */

}

/* ปุ่ม */

    background: rgba(255,215,0,0.2);

    color: gold;
    text-decoration: none;
    border-radius: 8px;
    font-size: 13px;
}
}</style>

function createStar() {
    const star = document.createElement("div");
    star.className = "star";

    star.style.left = Math.random() * window.innerWidth + "px";
    star.style.animationDuration = (1 + Math.random() * 2) + "s";

    document.getElementById("stars").appendChild(star);

    setTimeout(() => {
        star.remove();
    }, 3000);
}

setInterval(createStar, 300);
</script>

        light.style.transform = "translate(-50%, -50%) scale(1)";

        // หน่วงนิดเดียวแล้วค่อยไปหน้าใหม่
