<style>
body { margin: 0; }

#room {
    height: 100vh;
    position: relative;
    overflow: hidden;
    cursor: pointer;
}

/* 🌄 ภาพ */
.bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    transition: opacity 1s ease;
}

.bg1 { opacity: 1; }
.bg2 { opacity: 0; }

/* ✨ ข้อความ */

.text{

    position:fixed;

    left:50%;
    bottom:90px;

    transform:translateX(-50%);

    width:88%;

    z-index:9999;

    color:white;

    text-align:center;

    font-size:32px;

    line-height:1.7;

    text-shadow:
      0 0 10px rgba(0,0,0,0.9);

}

.nav{

  position:fixed;

  bottom:10px;
  left:50%;

  transform:translateX(-50%);

  width:95%;

  display:flex;
  flex-wrap:wrap;
  justify-content:center;

  gap:12px;

  z-index:99999;
}

.nav a{

  background:white !important;

  color:#1e5eff !important;

  border:2px solid #1e5eff !important;

  text-decoration:none;

  padding:14px 20px;

  border-radius:28px;

  font-size:18px;

  font-weight:bold;

  min-width:220px;

  text-align:center;

  box-shadow:0 0 15px rgba(255,255,255,0.35);
}

/* ✨ เอฟเฟกต์ลอย + แสง */
@keyframes floatText {
    0% {
        transform: translateY(-50%) translateY(0px);
        text-shadow: 0 0 10px rgba(255,255,255,0.4);
    }
    50% {
        transform: translateY(-50%) translateY(-10px);
        text-shadow: 0 0 25px rgba(255,255,255,0.9);
    }
    100% {
        transform: translateY(-50%) translateY(0px);
        text-shadow: 0 0 10px rgba(255,255,255,0.4);
    }
}

/* 🌙 soft glow */
body{
  filter: brightness(1.05);
}

</style>
</head>

let i = 0;
let toggle = true;

let room = document.getElementById("room");
let bg1 = document.querySelector(".bg1");
let bg2 = document.querySelector(".bg2");
let textBox = document.querySelector(".text");

/* 🌙 ภาพเริ่มต้น */
bg1.style.backgroundImage = "url('" + images[0] + "')";
textBox.innerHTML = texts[0];

room.onclick = function () {

    i = (i + 1) % images.length;

    /* ✨ เปลี่ยนข้อความตามภาพ */
    textBox.innerHTML = texts[i];

    if (toggle) {
        bg2.style.backgroundImage = "url('" + images[i] + "')";
        bg2.style.opacity = 1;
        bg1.style.opacity = 0;
    } else {
        bg1.style.backgroundImage = "url('" + images[i] + "')";
        bg1.style.opacity = 1;
        bg2.style.opacity = 0;
    }

    toggle = !toggle;
};</script>
