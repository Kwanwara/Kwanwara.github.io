<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>คัมภีร์ใต้แสงจันทร์</title>

<style>

body { margin: 0; }

#room {
    height: 100vh;
    position: relative;
    overflow: hidden;
    cursor: pointer;
}

/* 🌄 ภาพ */
.bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    transition: opacity 1s ease;
}

.bg1 { opacity: 1; }
.bg2 { opacity: 0; }

/* ✨ ลอยนุ่ม */
@keyframes floatTitle {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
}

/* ✨ ข้อความบนภาพ */
.text{
  position:absolute;
  top:22%;
  left:51%;
  transform:translateX(-50%);
  width:90%;
  max-width:680px;
  z-index:9999;

  color:#8B4513;
  text-align:center;
  font-size:clamp(17px, 4.2vw, 18px);
  line-height:2;
  

  padding:8px 12px;

}

.text h1{
  font-size:clamp(24px, 5vw, 38px);
  margin:0 0 10px;
  color:#8B4513;
}

/* 🚪 ปุ่มนำทาง */
.nav,
.end-nav{
  position:absolute;
  bottom:50px;
  left:50%;
  transform:translateX(-50%);
  width:96%;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:8px;
  z-index:99999;
 
}

.nav a,
.end-nav a{
  background:rgba(40,28,12,0.78);
  color:#ffffff !important;
  border:2px solid rgba(255,215,120,0.45);
  text-decoration:none;
  margin-top:20;

  padding:8px 12px;
  border-radius:24px;
  font-size:clamp(17px, 4vw, 18px);
    line-height:1.4;
  font-weight:bold;
  min-width:120px;
  text-align:center;

  box-shadow:0 0 10px rgba(0,0,0,0.65);
}

/* 📱 มือถือ */
@media(max-width:768px){

  .text{
    top:5%;
    width:92%;
      font-size:clamp(18px, 4vw, 20px);
    line-height:1.4;
    padding:6px 10px;
  }

  .text h1{
font-size:clamp(18px, 4vw, 20px);
    line-height:1.4;
    margin-bottom:8px;
  }

  .nav,
  .end-nav{
    bottom:8px;
    gap:6px;
    margin-top:20;
  }

  .nav a,
  .end-nav a{
     font-size:clamp(17px, 4vw, 18px);
    line-height:1.4;
    min-width:105px;
    padding:7px 10px;
    border-radius:22px;
    margin-top:20;
  }
}

</style>
</head>

<body>

<section>

<div id="room">

    <div class="bg bg1"></div>
    <div class="bg bg2"></div>

    <div class="text">
      <h1>แสงนำทาง 1</h1>
        <p>"แตะที่พื้นภาพ… <br>แล้วคุณจะเห็นแสงนำทาง</p>
    </div>

</div>

<!-- 🚪 ปุ่มนำทาง -->
<div class="end-nav" id=endNav>
  <a href="books3-1.html" class="btn">ย้อนดูภาค 1</a>
  <a href="books.html#story-point" class="back-btn">กลับห้อง</a>
  <a href="books3-2.html" class="btn">ไปดูภาค 2</a>

</div>
 

</div>

<script>
let images = ["books-photo3-1.0.jpg","books-photo3-1.1.jpg","books-photo3-1.2.jpg"];

let texts = ["",
 "",
 "คัมภีร์ใต้แสงจันทร์ <br>ภาค 1 จุดกำเนิดของแสง<br>ไม่มีใครตั้งใจจะเขียนคัมภีร์เล่มนี้ มันไม่ได้เริ่มต้นจาก<br>นักเขียน ไม่ได้เริ่มต้นจากครู ไม่ได้เริ่มต้นจากความคิด<br>ที่จะสร้างหนังสือสักเล่ม  มันเริ่มต้นจากบทเพลงหนึ่งบท<br> บทเพลงที่ส่งผ่านความคิดถึงไปยังใครบางคนบนฟ้า <br>ค่อยๆกลายเป็นเรื่องเล่า และจากเรื่องเล่า จึงกลายมาเป็น<br> “คัมภีร์ใต้แสงจันทร์”เรื่องราวในเล่มนี้ มิได้เกิดจาก<br>จินตนาการเพียงอย่างเดียว แต่เกิดจากเหตุการณ์จริง<br> ความรู้สึกจริง รอยยิ้มจริง และข้อคิดที่เกิดขึ้น<br>ระหว่างทาง ใต้แสงจันทร์ ที่คอยส่องนำทาง<br>อย่างเงียบงาม หากพร้อมแล้ว เชิญคลิกเปิดอ่านที่พื้นภาพ<br> แล้วปล่อยให้หัวใจออกเดินทางไปพร้อมกับแสงจันทร์"];

let i = 0;
let toggle = true;

let room = document.getElementById("room");
let bg1 = document.querySelector(".bg1");
let bg2 = document.querySelector(".bg2");
let textBox = document.querySelector(".text");

/* 🌙 ภาพเริ่มต้น */
bg1.style.backgroundImage = "url('" + images[0] + "')";
textBox.innerHTML = texts[0];

room.onclick = function () {

    i = (i + 1) % images.length;

    /* ✨ เปลี่ยนข้อความตามภาพ */

    textBox.innerHTML = texts[i];

    if (toggle) {
        bg2.style.backgroundImage = "url('" + images[i] + "')";
        bg2.style.opacity = 1;
        bg1.style.opacity = 0;
    } 
else {
        bg1.style.backgroundImage = "url('" + images[i] + "')";
        bg1.style.opacity = 1;
        bg2.style.opacity = 0;
    }

    toggle = !toggle;
};

</script>

</section>

</body>
</html>
