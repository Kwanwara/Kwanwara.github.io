<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>คัมภีร์ใต้แสงจันทร์ ภาค 1</title>

<style>

body { margin: 0; }

#room {
    height: 100vh;
    position: relative;
    overflow: hidden;
    cursor: pointer;
}

/* 🌄 ภาพ */
.bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    transition: opacity 1s ease;
}

.bg1 { opacity: 1; }
.bg2 { opacity: 0; }

/* ✨ ลอยนุ่ม */
@keyframes floatTitle {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
}

/* ✨ ข้อความบนภาพ */
.text{
  position:absolute;
  top:4%;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  max-width:680px;
  z-index:9999;

  color:#f3d27a;
  text-align:center;
  font-size:clamp(18px, 4.2vw, 20px);
  line-height:1.4;
  font-weight:bold;

  padding:8px 12px;

  text-shadow:
    2px 2px 6px rgba(0,0,0,0.95),
    0 0 12px rgba(0,0,0,0.9);
}

.text h1{
  font-size:clamp(24px, 5vw, 38px);
  margin:0 0 10px;
  color:#f3d27a;
}

/* 🚪 ปุ่มนำทาง */
.nav,
.end-nav{
  position:absolute;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  width:96%;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:8px;
  z-index:99999;
  
}

.nav a,
.end-nav a{
  background:rgba(40,28,12,0.78);
  color:#f3d27a !important;
  border:2px solid rgba(255,215,120,0.45);
  text-decoration:none;

  padding:8px 12px;
  border-radius:24px;
  font-size:clamp(17px, 4vw, 18px);
    line-height:1.4;
  font-weight:bold;
  min-width:120px;
  text-align:center;

  box-shadow:0 0 10px rgba(0,0,0,0.65);
}

/* 📱 มือถือ */
@media(max-width:768px){

  .text{
    top:5%;
    width:92%;
      font-size:clamp(18px, 4vw, 20px);
    line-height:1.4;
    padding:6px 10px;
  }

  .text h1{
font-size:clamp(18px, 4vw, 20px);
    line-height:1.4;
    margin-bottom:8px;
  }



</style>
</head>

<body>

<section>

<div id="room">

    <div class="bg bg1"></div>
    <div class="bg bg2"></div>

    <div class="text">
      <h1>แสงนำทาง 1</h1>
        <p>"แตะที่พื้นภาพ… <br>เข้าไปอ่านเรื่องเล่าใต้แสงจันทร์</p>
    </div>

</div>

<!-- 🚪 ปุ่มนำทาง -->
<div class="end-nav" id=endNav>
  <a href="books3-1.html" class="btn">ย้อนดู ภาค1</a>
  <a href="books.html#story-point" class="back-btn">กลับห้อง</a>
  <a href="books3-2.html" class="btn">ไปดู ภาค2</a>

</div>
 

</div>

<script>
let images = ["books-photo3-1.0.jpg","books-photo3-1.1.jpg","books-photo3-1.2.jpg","books-photo3-1.3.jpg","books-photo3-1.4.jpg","books-photo3-1.5.jpg","books-photo3-1.6.jpg","books-photo3-1.7.jpg","books-photo3-1.8.jpg"];

let texts = ["",
 "",
 "แสงที่ 2 - ความเงียบที่กลายเป็นเพื่อน<br>“ในวันที่โลกกว้างเกินไป<br>ความเงียบกลับเป็นที่เดียว<br>ที่กอดหัวใจไว้ได้”",
 "แสงที่ 3 - ดวงจันทร์ที่ไม่เคยหายไป<br>“บางสิ่งไม่ได้พูดอะไรเลย<br>แต่กลับอยู่ข้างเราได้นานที่สุด”",
 "แสงที่ 4 - การเติบโตของคนชอบอยู่ตามลำพัง<br>“การอยู่คนเดียวไม่ได้แปลว่าโดดเดี่ยว<br>บางครั้งมันคือช่วงเวลา<br>ที่เราได้ฟังหัวใจตัวเองชัดที่สุด”",
 "แสงที่ 5 - 3 ธรรม นำทาง<br>“ธรรมะสอนให้เข้าใจ ใจ<br>ธรรมชาติสอนให้เข้าใจความจริง<br>และผู้คนสอนให้เข้าใจชีวิต”",
 "แสงที่ 6 - บ้านที่ยังไม่มีชื่อ<br>“ตอนนั้นยังไม่มีบ้านแห่งแสงจันทร์<br>มีเพียงหัวใจดวงหนึ่ง ที่กำลังค่อยๆ<br>เรียนรู้การเติบโตใต้แสงจันทร์”",
 "แสงสุดท้ายภาค 1 - เด็กหญิงกับดวงจันทร์<br>“และคืนหนึ่ง แสงบางอย่าง<br>ก็เริ่มเดินเข้ามาเงียบๆ<br>โดยที่เด็กคนนั้นยังไม่รู้เลยว่า<br>มันจะเปลี่ยนคืนเงียบทั้งหมดไปตลอดกาล”",
 "และบางที แสงที่เข้ามาเงียบๆในคืนนั้น<br>อาจไม่ได้มาเพียงเพื่ออยู่เป็นเพื่อน<br>แต่มาเพื่อช่วยกันสร้าง “บ้าน”<br>บ้านที่เต็มไปด้วยเรื่องเล่า รอยยิ้ม<br> ความวุ่นวาย และแสงนำทางของหัวใจ<br> จากคืนที่มีเพียงเด็กหญิงกับดวงจันทร์<br> เรื่องราวของจันทร์กับจ้าว<br>จึงเริ่มต้นขึ้นทีละนิด…✨<br>ในภาคต่อไป“คนที่เริ่มนั่งข้างกัน”🌙"];

let i = 0;
let toggle = true;

let room = document.getElementById("room");
let bg1 = document.querySelector(".bg1");
let bg2 = document.querySelector(".bg2");
let textBox = document.querySelector(".text");

/* 🌙 ภาพเริ่มต้น */
bg1.style.backgroundImage = "url('" + images[0] + "')";
textBox.innerHTML = texts[0];

room.onclick = function () {

    i = (i + 1) % images.length;

    /* ✨ เปลี่ยนข้อความตามภาพ */

    textBox.innerHTML = texts[i];

    if (toggle) {
        bg2.style.backgroundImage = "url('" + images[i] + "')";
        bg2.style.opacity = 1;
        bg1.style.opacity = 0;
    } 
else {
        bg1.style.backgroundImage = "url('" + images[i] + "')";
        bg1.style.opacity = 1;
        bg2.style.opacity = 0;
    }

    toggle = !toggle;
};

</script>

</section>

</body>
</html>
