<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>จุดพักใจ 1</title>

<style>

/* ===== พื้นหลัง ===== */
body{
  margin:0;
  font-family:Tahoma, sans-serif;
  color:white;

  background-image:url("rest0-2-photo.jpg");
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

/* ===== กลางจอ ===== */
.page-wrap{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;

  padding:5px 20px 20px;
}

/* ===== เนื้อเรื่อง ===== */
.story-content{
  max-width:700px;
  line-height:1.9;
  color:gold;
  font-size:28px;
    margin-bottom:100;
}

/* ===== ชื่อเรื่อง ===== */
.story-title{
  font-size:32px;
  margin-bottom:50;
  color:gold;
}

.story-subtitle{
  opacity:0.8;
  margin-bottom:250px;
  color:gold;
 font-size:30px;
}
/* ===== เส้นคั่น ===== */
.story-divider{
  width:60%;
  height:1px;
  background:none;
  margin:40px auto;
margin-bottom:300;
}

/* ===== ปุ่ม ===== */
.story-nav{
  display:flex;
  gap:15px;
  justify-content:center;
  flex-wrap:wrap;
  background:none;

}

.story-nav a{
  text-decoration:none;
  color:#ffd86b;
  border:1px solid #ffd86b;
  padding:10px 18px;
  border-radius:20px;
}

/* เอฟเฟกต์ลอยขึ้น + จาง → ชัด */
.fade-in{
  opacity:0;
  transform:translateY(20px);
  animation:fadeUp 1.5s ease forwards;
}

@keyframes fadeUp{
  to{
    opacity:1;
    transform:translateY(0);
  }
}
/* ===== แสงจันทร์ลอย ===== */
body::before{
  content:"";
  position:fixed;
  inset:0;

  background:radial-gradient(circle at 70% 20%, rgba(255,220,120,0.25), transparent 60%);

  pointer-events:none;
  z-index:-1;   /* 👈 เปลี่ยนจาก 0 เป็น -1 */
}
.page-wrap{
  pointer-events:none;
}

.page-wrap *{
  pointer-events:auto;
}
/* ===== ตัวอักษรเรืองแสง ===== */
.story-title,
.story-content,
.story-subtitle{
  transition:0.4s;
}

/* ตอน hover / แตะ */
.story-title:hover,
.story-content:hover,
.story-subtitle:hover{
  color:#fff9d6;

  text-shadow:
    0 0 5px rgba(255,220,120,0.6),
    0 0 15px rgba(255,220,120,0.4),
    0 0 30px rgba(255,220,120,0.2);
}

.sound-btn{
 .sound-btn{
  margin-top:20px;

  display:inline-block;
  padding:10px 18px;

  border-radius:20px;
  border:1px solid #ffd86b;

  color:#ffd86b;
  background:none;

  cursor:pointer;
.sound-btn:hover{
  background:#ffd86b;
  color:gold;
}

  padding:10px 16px;
  border-radius:20px;

  background:none;
  color:#ffd86b;
  font-size:14px;

  cursor:pointer;
  backdrop-filter:blur(6px);
}

.sound-btn:hover{
  background:#ffd86b;
  color:black;
}
/* กันทุก layer มาบังการคลิก */
body::before,
body::after{
  pointer-events:none !important;
}

/* ยกทุกปุ่ม + audio ขึ้นชั้นบนสุด */
.sound-btn,
audio,
#moonSound{
  position:relative;
  z-index:9999 !important;
  pointer-events:auto;
}

* 🔥 ปลดล็อกการคลิกทั้งเว็บ */
*{
  pointer-events:auto !important;
}

/* ===== ปุ่มเสียง ===== */
.audio-box{
  margin-top:20px;
}

</style>
</head>

<body>

<div class="page-wrap">
<div class="reading-room">

<!-- ===== หัวเรื่อง ===== -->

<h1 class="story-title fade-in">


</h1>

<div class="story-subtitle fade-in">



</div>

<div class="story-content fade-in">


"บ้านหลังนี้<br>
อาจไม่ได้ทำให้ทุกอย่างหายเหนื่อยทันที<br>
แต่หวังว่าจะเป็นที่ให้ใจได้พัก…<br>
แม้เพียงชั่วครู่ กับเรื่องราวของจ้าวกับจันทร์<br>
ใต้แสงจันทร์ ทั้ง 24 ตอน🌙"

    </div>
</div>

<div class="story-divider"></div>

<!-- ===== ปุ่มนำทาง ===== -->
<div id="storyNav"></div>

<button onclick="toggleSound()" class="sound-btn">
</button>

<script>

const nav = document.getElementById("storyNav");

if(nav){

nav.innerHTML = `
<div class="story-nav">
  <a href="rest0-1.html">ย้อนกลับ</a>
   <a href="rest.html#story-point" class="back-btn">
        ⬅️กลับห้องพักใจ
    </a>
  <a href="rest1.html">24เรื่องราว</a>
</div>
`;
}

</script>

<script>

window.addEventListener("scroll", function(){
  let y = window.scrollY;
  document.body.style.backgroundPosition = "center " + (y * 0.3) + "px";
});

</script>

<audio id="moonSound" loop>
  <source src="moon-breath.mp3" type="audio/mpeg">
</audio>

<script>

let playing = false;

function toggleSound(){
  const audio = document.getElementById("moonSound");
  const btn = document.querySelector(".sound-btn");

  if(!playing){
    audio.volume = 0.3;   // 🔊 เบา ๆ
    audio.play();
    btn.innerHTML = "🌙 ปิดเสียงจันทร์";
    playing = true;
  }else{
    audio.pause();
    btn.innerHTML = "🌙 เปิดเสียงจันทร์";
    playing = false;
  }
}

audio.volume = 0;
audio.play();

let vol = 0;
let fade = setInterval(()=>{
  if(vol < 0.3){
    vol += 0.02;
    audio.volume = vol;
  }else{
    clearInterval(fade);
  }
}, 100);


<script>
const btn = document.getElementById("soundBtn");
const audio = document.getElementById("moonSound");


});
</script>

<div class="audio-box">
  <audio controls>
    <source src="rest1-1-song.mp3" type="audio/mpeg">
  </audio>
</div>

</body>
</html>
