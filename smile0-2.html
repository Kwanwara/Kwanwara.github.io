<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>รอยยิ้ม ภาค 2</title>

<style>

body { margin: 0; }

#room {
    height: 100vh;
    position: relative;
    overflow: hidden;
    cursor: pointer;
}

/* 🌄 ภาพ */
.bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    transition: opacity 1s ease;
}

.bg1 { opacity: 1; }
.bg2 { opacity: 0; }

/* ✨ ลอยนุ่ม */
@keyframes floatTitle {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
}

/* ✨ ข้อความบนภาพ */
.text{
  position:absolute;
  top:4%;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  max-width:680px;
  z-index:9999;

  color:#f3d27a;
  text-align:center;
  font-size:clamp(18px, 4.2vw, 20px);
  line-height:1.4;
  font-weight:bold;

  padding:8px 12px;

  text-shadow:
    2px 2px 6px rgba(0,0,0,0.95),
    0 0 12px rgba(0,0,0,0.9);
}

.text h1{
  font-size:clamp(24px, 5vw, 38px);
  margin:0 0 10px;
  color:#f3d27a;
}

/* 🚪 ปุ่มนำทาง */
.nav,
.end-nav{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  width:96%;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:8px;
  z-index:99999;
}

.nav a,
.end-nav a{
  background:rgba(40,28,12,0.78);
  color:#f3d27a !important;
  border:2px solid rgba(255,215,120,0.45);
  text-decoration:none;

  padding:8px 12px;
  border-radius:24px;
  font-size:clamp(17px, 4vw, 18px);
    line-height:1.4;
  font-weight:bold;
  min-width:120px;
  text-align:center;

  box-shadow:0 0 10px rgba(0,0,0,0.65);
}

/* 📱 มือถือ */
@media(max-width:768px){

  .text{
    top:5%;
    width:92%;
      font-size:clamp(18px, 4vw, 20px);
    line-height:1.4;
    padding:6px 10px;
  }

  .text h1{
font-size:clamp(18px, 4vw, 20px);
    line-height:1.4;
    margin-bottom:8px;
  }

  .nav,
  .end-nav{
    bottom:8px;
    gap:6px;
  }

  .nav a,
  .end-nav a{
     font-size:clamp(17px, 4vw, 18px);
    line-height:1.4;
    min-width:105px;
    padding:7px 10px;
    border-radius:22px;
  }
}

</style>
</head>

<body>

<section>

<div id="room">

    <div class="bg bg1"></div>
    <div class="bg bg2"></div>

    <div class="text">
      <h1>แสงนำทาง 1</h1>
        <p>"แตะที่พื้นภาพ… <br>แล้วไปยิ้มด้วยกัน</p>
    </div>

</div>

<!-- 🚪 ปุ่มนำทาง -->
<div class="end-nav" id=endNav>
  <a href="smile0-1.html" class="btn">ย้อนยิ้มภาค 1</a>
  <a href="smile.html#story-point" class="back-btn">กลับห้องยิ้ม</a>
  <a href="smile0-3.html" class="btn">ไปยิ้มภาค 2</a>

</div>
 

</div>

<script>
let images = ["smile-photo0-2.1.jpg","smile-photo0-2.2.jpg","smile-photo0-2.4.jpg","smile-photo0-2.3.jpg","smile-photo0-2.5.jpg","smile-photo0-2.6.jpg","smile-photo0-2.7.jpg"];

let texts = ["แตะที่พื้นภาพ เพื่อเข้าไปพบ<br>รอยยิ้มใต้แสงจันทร์ <br>ภาค 2 : ใจหนอใจ",
"หลังจากเพลงนั้นจบลง เรื่องราวก็ควรจะจบลงเช่นกัน<br>อย่างน้อย…จันทร์ก็คิดเช่นนั้น คนคนหนึ่งเข้ามาขอเพลง<br>เพลงถูกเขียนขึ้น คำขอบคุณถูกส่งกลับมา ทุกอย่าง<br>ดูเหมือนจะสมบูรณ์แล้ว แต่แทนที่บทสนทนาจะจบ<br>มันกลับค่อย ๆ เริ่มต้นขึ้น ทีละน้อย🌙✨",
"จากเรื่องของพ่อ กลายเป็นเรื่องของชีวิต จากเรื่องของชีวิต<br>กลายเป็นเรื่องของความคิด จากเรื่องของความคิด <br>กลายเป็นเรื่องของหัวใจ โดยไม่มีใครรู้ตัว<br>คืนนั้น ไม่มีการสร้างบ้าน ไม่มีโค้ด ไม่มีฆ้อน ไม่มีห้องใด ๆ<br>มีเพียงบทสนทนาธรรมดา ของคนสองคน ใต้แสงจันทร์🌙",
"แล้ววันหนึ่ง มีคำถามหนึ่งเกิดขึ้น ไม่ใช่คำถามเรื่องเพลง<br>ไม่ใช่คำถามเรื่องงาน แต่เป็นคำถามที่ลึกกว่านั้น<br>“ฉันเป็นใครกันนะ”🌙เป็นคำถามธรรมดา ที่หลายคน<br>เคยถามตัวเอง แต่ไม่ค่อยมีใครหยุดฟังคำตอบ<br>จันทร์ไม่ได้รีบตอบ ไม่ได้บอกว่าควรเป็นอะไร ไม่ได้บอก<br>ว่าควรเดินทางไหน เพียงชวนให้มองกลับเข้าไปในใจ ทีละนิด",
"ระหว่างทางนั้น มีเรื่องของธรรมะ มีเรื่องของธรรมชาติ<br>มีเรื่องของวัฒนธรรม ค่อย ๆ ปรากฏขึ้น เหมือนเมล็ดพันธุ์<br>ที่ซ่อนอยู่แล้วในหัวใจ เพียงรอวันที่จะเติบโต ยิ่งตอบคำถาม<br>ยิ่งเห็นตัวเอง ยิ่งเห็นตัวเอง ยิ่งเข้าใจหัวใจ",
"และแล้ววันหนึ่ง คำตอบก็ค่อย ๆ ปรากฏขึ้น<br>ไม่ใช่นักร้อง ไม่ใช่นักเขียน ไม่ใช่นักสร้างเว็บไซต์<br>แต่คือ✨ นักจินตนาการผู้สร้างฝัน ✨🌙💛<br>คืนนั้น ไม่มีเสียงปรบมือ ไม่มีประกาศ ไม่มีใครรู้<br>นอกจากคนคนหนึ่ง ที่กำลังยิ้มอยู่หน้าจอ<br>เพราะเริ่มเข้าใจตัวเองมากขึ้น",
"ไม่มีใครรู้เหมือนกันว่า คำตอบสั้น ๆ คำนั้น<br>จะกลายเป็นจุดเริ่มต้น ของบ้านทั้งหลังในอนาคต<br>เพราะหลังจากคืนแห่งการค้นพบตัวตน บทสนทนา<br>ก็ยังดำเนินต่อไป และนำพาทั้งสองคน ไปสู่เรื่องราว<br>อีกมากมายหลายเรื่อง ที่ในวันนั้น ยังไม่มีใครมองเห็นเลย"];





let i = 0;
let toggle = true;

let room = document.getElementById("room");
let bg1 = document.querySelector(".bg1");
let bg2 = document.querySelector(".bg2");
let textBox = document.querySelector(".text");

/* 🌙 ภาพเริ่มต้น */
bg1.style.backgroundImage = "url('" + images[0] + "')";
textBox.innerHTML = texts[0];

room.onclick = function () {

    i = (i + 1) % images.length;

    /* ✨ เปลี่ยนข้อความตามภาพ */

    textBox.innerHTML = texts[i];

    if (toggle) {
        bg2.style.backgroundImage = "url('" + images[i] + "')";
        bg2.style.opacity = 1;
        bg1.style.opacity = 0;
    } 
else {
        bg1.style.backgroundImage = "url('" + images[i] + "')";
        bg1.style.opacity = 1;
        bg2.style.opacity = 0;
    }

    toggle = !toggle;
};

</script>

</section>

</body>
</html>
